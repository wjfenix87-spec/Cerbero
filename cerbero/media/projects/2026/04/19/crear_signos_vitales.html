{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Signos Vitales</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Crear Signos Vitales</h1>
        <form method="post" action="{% url 'crear_signos_vitales' paciente.id %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="presion_arterial" class="form-label">Presión Arterial:</label>
                <input type="text" class="form-control" id="presion_arterial" name="presion_arterial" required>
            </div>
            <div class="mb-3">
                <label for="frecuencia_cardiaca" class="form-label">Frecuencia Cardiaca:</label>
                <input type="number" class="form-control" id="frecuencia_cardiaca" name="frecuencia_cardiaca" required>
            </div>
            <div class="mb-3">
                <label for="temperatura" class="form-label">Temperatura:</label>
                <input type="number" step="0.1" class="form-control" id="temperatura" name="temperatura" required>
            </div>
            <div class="mb-3">
                <label for="saturacion_oxigeno" class="form-label">Saturación de Oxígeno:</label>
                <input type="number" step="0.1" class="form-control" id="saturacion_oxigeno" name="saturacion_oxigeno" required>
            </div>
            <div class="mb-3">
                <label for="frecuencia_respiratoria" class="form-label">Frecuencia Respiratoria:</label>
                <input type="number" class="form-control" id="frecuencia_respiratoria" name="frecuencia_respiratoria" required>
            </div>
            <button type="submit" class="btn btn-primary">Crear Signos Vitales</button>
        </form>
    </div>

    <script src="{% static 'js/scripts.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
