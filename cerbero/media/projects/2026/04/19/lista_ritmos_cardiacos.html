<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Ritmos Cardíacos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Ritmos Cardíacos</h2>
        <a href="{% url 'inicio' %}" class="btn btn-secondary mb-3">Regresar</a>
        <table class="table">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Signos Vitales</th>
                    <th>Tipo de Ritmo</th>
                    <th>Descripción</th>
                    <th>Fecha y Hora</th>
                </tr>
            </thead>
            <tbody>
                {% for ritmo in ritmos %}
                <tr>
                    <td>{{ ritmo.paciente }}</td>
                    <td>{{ ritmo.signos_vitales }}</td>
                    <td>{{ ritmo.tipo_ritmo }}</td>
                    <td>{{ ritmo.descripcion }}</td>
                    <td>{{ ritmo.fecha_hora|date:"M. d, Y, g:i a" }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
